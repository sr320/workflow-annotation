version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./output:/app/output
      - ./blastdb:/app/blastdb
      - ./uploads:/app/uploads
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - PORT=5000
      - DEBUG=False
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
